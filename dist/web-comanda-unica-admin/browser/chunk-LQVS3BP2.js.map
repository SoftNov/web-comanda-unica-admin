<app-header />

<main id="main-content" class="legal section">
  <div class="container legal__container">
    <a class="legal__back" routerLink="/">
      <span class="material-icons" aria-hidden="true">arrow_back</span>
      Voltar para a página inicial
    </a>

    <h1>{{ title }}</h1>
    <p class="legal__updated">Última atualização: {{ updatedAt }}</p>

    <article class="legal__content">
      <ng-content />
    </article>
  </div>
</main>

<app-footer />
