<section class="comparison section">
  <div class="container">
    <div class="section-heading section-heading--center" appScrollReveal="up">
      <span class="eyebrow">Comparativo</span>
      <h2 class="section-title" style="margin-top: 16px;">Veja a diferença na prática</h2>
    </div>

    <div class="comparison__grid">
      <div class="comparison__col comparison__col--bad card" appScrollReveal="up" [revealDelay]="80">
        <h3>Outros Sistemas</h3>
        <ul>
          @for (row of rows; track row.others) {
            <li>
              <span class="material-icons" aria-hidden="true">close</span>
              {{ row.others }}
            </li>
          }
        </ul>
      </div>

      <div class="comparison__col comparison__col--good card" appScrollReveal="up" [revealDelay]="160">
        <h3>Comanda Única</h3>
        <ul>
          @for (row of rows; track row.ours) {
            <li>
              <span class="material-icons" aria-hidden="true">check</span>
              {{ row.ours }}
            </li>
          }
        </ul>
      </div>
    </div>
  </div>
</section>
